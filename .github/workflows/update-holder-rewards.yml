name: Update Holder Rewards

on:
  schedule:
    - cron: "19 11 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: holder-rewards-upstream-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out this community deployment
        uses: actions/checkout@v6

      - name: Find the latest Holder Rewards release
        id: release
        shell: bash
        run: |
          tag="$(curl --fail --silent --show-error \
            https://api.github.com/repos/Sheriff1980/holder-rewards/releases/latest |
            jq --raw-output .tag_name)"
          test -n "$tag"
          test "$tag" != "null"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Download the release source
        shell: bash
        run: |
          git clone --depth 1 --branch "${{ steps.release.outputs.tag }}" \
            https://github.com/Sheriff1980/holder-rewards.git upstream

      - name: Synchronize the standalone Cloudflare app
        shell: bash
        run: |
          rsync --archive --delete \
            --exclude ".git/" \
            --exclude ".wrangler/" \
            --exclude "node_modules/" \
            --exclude "dist/" \
            upstream/cloudflare/ ./
          rm -rf upstream

      - name: Publish the update
        shell: bash
        run: |
          if git diff --quiet; then
            echo "Already up to date."
            exit 0
          fi
          git config user.name "holder-rewards-updater"
          git config user.email "holder-rewards-updater@users.noreply.github.com"
          git add --all
          git commit -m "Update Holder Rewards to ${{ steps.release.outputs.tag }}"
          git push
